# MUST match the project that VITE_SUPABASE_URL in .env points at.
#
# This has already gone wrong once and cost a day: the file named one project
# while the app talked to another, so every `supabase link` / `db push` /
# `functions deploy` run from this repo was aimed at a project nothing read —
# which is how the schema ended up live with not one edge function deployed.
# If you change one, change the other in the same commit.
project_id = "REPLACE_WITH_PROJECT_REF"

[auth]
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false

[functions.extract-questions]
verify_jwt = true

[functions.submit-response]
verify_jwt = false

# MUST stay false. Respondents hold no Supabase JWT by design — the function
# authenticates them itself, against the case's access token (the secret in the
# link/QR), the family's phone number, and its own session token. Turning JWT
# verification on here returns 401 to every family and kills the entire
# respondent flow, with nothing in the UI to explain why.
[functions.family-access]
verify_jwt = false
