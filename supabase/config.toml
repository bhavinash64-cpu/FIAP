# Must match the project VITE_SUPABASE_URL points at. It did not: this file
# named `wfuxtealkrudukvpmtrg` while the app has always talked to
# `atlekmwlqweqxrfbvwie`. Every `supabase link` / `db push` / `functions deploy`
# run from this repo was therefore aimed at the wrong project, which is why the
# migrations are live but not one edge function is deployed.
project_id = "atlekmwlqweqxrfbvwie"

[auth]
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false

[functions.extract-questions]
verify_jwt = true

[functions.submit-response]
verify_jwt = false

# Respondents hold no Supabase JWT by design — the function authenticates them
# itself, against the family case's own PIN and session token.
[functions.family-access]
verify_jwt = false
