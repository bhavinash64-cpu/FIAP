<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is what makes env(safe-area-inset-*) resolve to real values on
         notched iPhones; without it every inset is 0px and the assessment's sticky action bar
         sits under the home indicator. No user-scalable/maximum-scale: pinch zoom stays on
         (WCAG 1.4.4), and iOS focus-zoom is avoided by keeping input text >=16px instead. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <link rel="icon" href="/logo.png" type="image/png" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Design-system fonts: Inter (UI, variable incl. 550) + Noto Sans Telugu (every Telugu
         prompt, option and label) + Fraunces (editorial serif).
         Noto Sans Telugu is named in three font stacks in src/index.css but was never fetched,
         so Telugu fell back to whatever the device happened to ship — Nirmala UI on Windows,
         nothing at all on cheaper Android handsets. For half this audience the survey is the
         Telugu text, so it is a first-class font, not a fallback. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&family=Noto+Sans+Telugu:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&display=swap"
    />
    <title>PsyDigiHealth — Family Assessment Research Platform</title>
    <meta name="description" content="PsyDigiHealth — a secure research platform for building family assessments from validated instruments, distributing them by QR, and analysing the responses." />
    <meta name="author" content="PsyDigiHealth" />

    <meta property="og:title" content="PsyDigiHealth — Family Assessment Research Platform" />
    <meta property="og:description" content="Build validated family assessments, distribute by QR, and analyse the results." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
